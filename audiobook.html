<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficverse Audiobooks</title>
    <link rel="stylesheet" href="styles.css"> <!-- Link to CSS -->
</head>
<body>
    <header>
        <div class="logo-container">
            <a href="index.html"><img src="logo.png" alt="Ficverse Logo" class="logo"></a>
            <h1>Ficverse</h1>
        </div>
    </header>
    <h1 style="text-align: center;">🎧 Listen to Our Audiobooks</h1>

    <section class="audiobook-container">
        <div class="audiobook">
            <img src="jack.png" alt="Book 1 Cover">
            <h3>Jack and the Beanstalk</h3>
            <audio controls>
                <source src="Jack and the Beanstalk.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="audiobook">
            <img src="The Fox and the Crow.png" alt="Book 2 Cover">
            <h3>The Fox and the Crow</h3>
            <audio controls>
                <source src="The Fox and the Crow.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="audiobook">
            <img src="beauty and the beast.png" alt="Book 3 Cover">
            <h3>Beauty and the Beast</h3>
            <audio controls>
                <source src="beauty and the beast.mp3" type="audio/mpeg">
            </audio>
        </div>
    </section>

</body>
</html>
